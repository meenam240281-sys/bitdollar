<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitDollar - Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0c0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      width: 100%;
    }
    :root {
      --cyan: #00c2ff;
      --card-bg: #13161a;
      --border: #2a2f36;
    }
    .dashboard-header {
      background: #13161a;
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
    }
    .logo span {
      color: var(--cyan);
    }
    .user-area {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .user-email {
      color: #b0b8c1;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid #ff4d6a;
      color: #ff4d6a;
      padding: 8px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background: #ff4d6a;
      color: white;
    }
    .main-content {
      flex: 1;
      padding: 40px 0;
    }
    .welcome-section {
      margin-bottom: 32px;
    }
    .welcome-section h2 {
      color: white;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .balance-card {
      background: linear-gradient(135deg, #1a1f2a, #0d1117);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .balance-label {
      color: #9aa4ae;
      font-size: 0.9rem;
    }
    .balance-amount {
      font-size: 2.4rem;
      font-weight: 700;
      color: white;
    }
    .balance-amount small {
      font-size: 1rem;
      color: var(--cyan);
      margin-left: 10px;
    }
    .plans-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 24px;
      margin-top: 24px;
    }
    .plan-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      transition: transform 0.2s;
    }
    .plan-card:hover {
      transform: translateY(-4px);
      border-color: var(--cyan);
    }
    .plan-card h4 {
      font-size: 1.4rem;
      color: white;
      margin-bottom: 12px;
    }
    .roi {
      font-size: 2rem;
      font-weight: 700;
      color: var(--cyan);
      margin: 12px 0;
    }
    .plan-detail {
      color: #b0b8c1;
      font-size: 0.9rem;
      margin: 6px 0;
    }
    .plan-detail i {
      color: var(--cyan);
      width: 18px;
      margin-right: 4px;
    }
    .invest-btn {
      background: var(--cyan);
      color: #0a0c0f;
      font-weight: 600;
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      margin-top: 16px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      display: inline-block;
      text-decoration: none;
    }
    .invest-btn:hover {
      background: #00a6d9;
    }
  </style>
</head>
<body>
  <header class="dashboard-header">
    <div class="container header-content">
      <div class="logo">Bit<span>Dollar</span> <small style="font-size: 0.9rem; color:#b0b8c1;">Dashboard</small></div>
      <div class="user-area">
        <span class="user-email" id="user-email"></span>
        <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </header>

  <main class="container main-content">
    <div class="welcome-section">
      <h2>Welcome, <span id="user-name">Investor</span></h2>
      <p style="color: #b0b8c1;">Here’s your portfolio overview.</p>
    </div>
    <div class="balance-card">
      <div>
        <div class="balance-label">Total Account Balance</div>
        <div class="balance-amount">$0.00 <small>USD</small></div>
        <p style="color: #9aa4ae; margin-top: 8px;"><i class="fas fa-chart-line"></i> Start investing to grow your balance</p>
      </div>
      <div style="font-size: 2rem; color: var(--cyan); opacity: 0.5;">
        <i class="fas fa-coins"></i>
      </div>
    </div>

    <div>
      <h3 style="color: white; font-size: 1.4rem; margin-bottom: 8px;">Investment Plans</h3>
      <p style="color: #b0b8c1;">Choose a plan to start earning daily returns.</p>
      <div class="plans-grid" id="plans-container">
        <!-- Plans will be injected by JS -->
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBTpBM1dEOxvDu46lNnQKCyIcG8BdMJ9FM",
      authDomain: "bitdollar-103a3.firebaseapp.com",
      projectId: "bitdollar-103a3",
      storageBucket: "bitdollar-103a3.firebasestorage.app",
      messagingSenderId: "861868362615",
      appId: "1:861868362615:web:9ae41f96df910a4109af72",
      measurementId: "G-DMWHEG6FYJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const plansData = [
      { name: "Starter Plan", roi: "15%", duration: "1 day", requirement: "$50 - $999", assets: "Ethereum, BSC, Polygon" },
      { name: "Amateur Plan", roi: "40%", duration: "2 days", requirement: "$1,000 - $2,999", assets: "Ethereum, Solana, Avalanche" },
      { name: "Professional Plan", roi: "60%", duration: "4 days", requirement: "$3,000 - $9,999", assets: "Ethereum, Solana, Sui" },
      { name: "Expert Plan", roi: "80%", duration: "7 days", requirement: "$10,000 - unlimited", assets: "Gold, Silver, Platinum" }
    ];

    function renderPlans() {
      const container = document.getElementById('plans-container');
      container.innerHTML = plansData.map(plan => `
        <div class="plan-card">
          <h4>${plan.name}</h4>
          <div class="roi">${plan.roi}</div>
          <p class="plan-detail"><i class="far fa-clock"></i> ${plan.duration}</p>
          <p class="plan-detail"><i class="fas fa-dollar-sign"></i> ${plan.requirement}</p>
          <p class="plan-detail"><i class="fas fa-coins"></i> ${plan.assets}</p>
          <a href="mailto:peterrobertdib@gmail.com?subject=Investment Inquiry: ${encodeURIComponent(plan.name)}" 
             class="invest-btn">
            Invest Now
          </a>
        </div>
      `).join('');
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('user-email').textContent = user.email;
        const displayName = user.email ? user.email.split('@')[0] : 'Investor';
        document.getElementById('user-name').textContent = displayName;
        renderPlans();
      } else {
        window.location.href = 'login.html';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Logout error:', error);
        alert('Logout failed. Please try again.');
      }
    });
  </script>
</body>
</html>
