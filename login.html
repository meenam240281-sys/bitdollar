<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BitDollar - Login</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0c0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: #13161a;
      padding: 40px 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #2a2f36;
      text-align: center;
    }
    .login-container h1 {
      color: white;
      margin-bottom: 8px;
      font-size: 2rem;
    }
    .login-container h1 span {
      color: #00c2ff;
    }
    .subtitle {
      color: #9aa4ae;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: #b0b8c1;
      font-size: 0.9rem;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0c0f;
      border: 1px solid #2a2f36;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .input-group input:focus {
      border-color: #00c2ff;
    }
    .btn {
      width: 100%;
      background: #00c2ff;
      color: #0a0c0f;
      font-weight: 600;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover {
      background: #00a6d9;
    }
    .error-message {
      color: #ff4d6a;
      font-size: 0.9rem;
      margin-top: 12px;
      min-height: 20px;
    }
    .alt-link {
      margin-top: 24px;
      color: #9aa4ae;
    }
    .alt-link a {
      color: #00c2ff;
      text-decoration: none;
      font-weight: 600;
    }
    .logo {
      font-size: 2rem;
      margin-bottom: 16px;
      color: white;
    }
    .logo span {
      color: #00c2ff;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">Bit<span>Dollar</span></div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to access your investment dashboard</p>

    <form id="login-form">
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <div class="error-message" id="error-message"></div>
    <p class="alt-link">Don't have an account? <a href="signup.html">Sign up here</a></p>
  </div>

  <!-- Firebase JS SDK (modular) -->
  <script type="module">
    // Import necessary Firebase modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBTpBM1dEOxvDu46lNnQKCyIcG8BdMJ9FM",
      authDomain: "bitdollar-103a3.firebaseapp.com",
      projectId: "bitdollar-103a3",
      storageBucket: "bitdollar-103a3.firebasestorage.app",
      messagingSenderId: "861868362615",
      appId: "1:861868362615:web:9ae41f96df910a4109af72",
      measurementId: "G-DMWHEG6FYJ"
    };

    // Initialize Firebase app
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Login form handling
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('error-message');
      errorMessage.textContent = '';

      if (!email || !password) {
        errorMessage.textContent = 'Please fill in all fields.';
        return;
      }

      try {
        // Firebase sign-in
        await signInWithEmailAndPassword(auth, email, password);
        // Redirect to dashboard on success
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error(error);
        // Handle specific error codes for better UX
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorMessage.textContent = 'Invalid email or password.';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage.textContent = 'Invalid email format.';
        } else {
          errorMessage.textContent = 'Login failed. Please try again.';
        }
      }
    });
  </script>
</body>
</html>
